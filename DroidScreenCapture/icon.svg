<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Phone body -->
  <rect x="168" y="96" width="176" height="320" rx="20" fill="none" stroke="#e0e0e0" stroke-width="12"/>
  <!-- Screen -->
  <rect x="184" y="128" width="144" height="240" rx="4" fill="#3a86ff" opacity="0.2"/>
  <!-- Rec dot -->
  <circle cx="336" cy="160" r="24" fill="#ff3b5c"/>
  <circle cx="336" cy="160" r="24" fill="#ff3b5c" opacity="0.4">
    <animate attributeName="r" values="24;30;24" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Android antenna left -->
  <line x1="224" y1="96" x2="210" y2="68" stroke="#3ddc84" stroke-width="10" stroke-linecap="round"/>
  <!-- Android antenna right -->
  <line x1="288" y1="96" x2="302" y2="68" stroke="#3ddc84" stroke-width="10" stroke-linecap="round"/>
</svg>
